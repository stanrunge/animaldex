services:
  animaldex-db:
    image: postgis/postgis:17-3.5
    restart: unless-stopped
    environment:
      POSTGRES_DB: animaldex
      POSTGRES_USER: animaldex
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - animaldex-db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"

  animaldex-app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3000"
    env_file: .env
    depends_on:
      - animaldex-db

volumes:
  animaldex-db-data:
